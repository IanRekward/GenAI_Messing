name: On-Demand Dashboard Refresh

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r market_dashboard/requirements.txt

      - name: Run dashboard (on-demand)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd market_dashboard
          python run_dashboard.py --ondemand --no-alerts --quiet

      - name: Publish to GitHub Pages
        run: |
          mkdir -p docs
          cp market_dashboard/output/dashboard.html docs/index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "Dashboard unchanged, nothing to push."
          else
            git commit -m "Publish dashboard $(date -u '+%Y-%m-%d %H:%M UTC') [on-demand]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi
