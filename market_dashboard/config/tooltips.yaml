# Plain-English tooltips for every dashboard element.
# Each entry answers: what does this measure, how to interpret it, why it matters.
# Keep each 'tip' under 280 characters for the CSS bubble.

composite:
  title: "Composite Stress Score (0–100)"
  tip: "Weighted average of all 10 market buckets. Under 30 = calm. 30–50 = elevated but normal. 50–70 = stressed. Above 70 = rare, serious — historically precedes significant drawdowns."

bands:
  green: "Below 30: calm. Historical data suggests low near-term drawdown risk."
  yellow: "30–50: elevated. Worth monitoring but not actionable on its own."
  orange: "50–70: stressed. At least one bucket is flashing warnings. Consider reviewing your positions."
  red: "Above 70: high stress. Historically associated with elevated drawdown risk in the following 30–90 days."

momentum:
  tip: "Rate of change of the composite over the past 7 days. Rising stress that hasn't yet triggered a band change — early warning of escalation."

correlation:
  tip: "Mean absolute pairwise correlation across all 10 bucket scores (30-day window). Above 0.60 = crisis-synchronous: buckets moving together, the signature of a broad risk-off event."

regime_window:
  tip: "Composite score recomputed using only the trailing 3-year window for percentile ranking. Highlights stress that looks normal vs. 10 years of history but elevated vs. the recent regime — useful when the market has been calm for years."

shock_type:
  fast_shock: "Composite rose ≥8 pts in 7 days, or ≥4 pts with 3+ buckets accelerating simultaneously. Fast shocks (2020 COVID, 2022 rate shock) demand prompt attention; they rarely revert quickly."
  slow_burn: "Composite is elevated (≥40) but moving slowly — lingering stress without acute escalation. Classic in late-cycle credit deterioration and pre-recession periods. Can persist for months."
  recovery: "Composite is falling from an elevated level at ≥5 pts/7d. Stress is unwinding. Historically, recoveries can stall or reverse — watch for re-escalation in credit and funding buckets."
  calm: "Composite is low and stable. No significant directional velocity across buckets."

buckets:
  equity_volatility:
    tip: "Measures fear and uncertainty in the stock market. Spikes in VIX and realized vol are early warning signs of panic selling and typically precede credit and funding stress."
  credit_spreads:
    tip: "How much extra yield investors demand to hold corporate bonds over risk-free Treasuries. Widening spreads mean lenders fear defaults — HY blowouts historically precede recessions by 6–12 months."
  rates_curve:
    tip: "The slope and level of the Treasury yield curve. An inverted curve (short rates above long) has preceded every U.S. recession since the 1970s."
  financial_conditions:
    tip: "Composite indexes measuring tightness of borrowing and credit across the economy. Tighter conditions choke off growth; looser conditions can signal complacency."
  inflation:
    tip: "Inflation pressure via 5-year inflation expectations and actual CPI. High inflation forces the Fed to tighten, which compresses asset prices and slows the economy."
  funding_liquidity:
    tip: "Stress in short-term money markets. A SOFR spread blowout is the modern equivalent of the 2008 LIBOR-OIS crisis — it means banks are charging each other above the Fed's target."
  commodities:
    tip: "Oil price level and oil volatility. Oil spikes historically trigger recessions (1973, 1979, 1990, 2007). High oil vol reflects geopolitical risk and supply uncertainty."
  economic_momentum:
    tip: "Lagging indicators of labor market health. Rising jobless claims or unemployment lag the crisis but confirm a recession is underway."
  sentiment:
    tip: "Investor positioning and geopolitical risk. Extreme bearish sentiment can be contrarian bullish; extreme geopolitical events can trigger systemic shocks regardless of valuations."
  global_spillover:
    tip: "Dollar strength and EM/European credit spreads. Dollar rallies signal global risk-off flows; EM spread widening often leads U.S. spread moves by weeks."

indicators:
  vix:
    tip: "CBOE Volatility Index — market's 30-day expected S&P 500 vol from options. Below 15 = calm. 15–25 = normal. 25–35 = elevated. Above 35 = panic. 2008 peak: ~89."
  sp500_1m_vol:
    tip: "Trailing 1-month realized volatility of the S&P 500 (annualized %). Captures actual, not implied, volatility. Spikes confirm options-implied fear is real."
  hy_oas:
    tip: "ICE BofA High Yield Option-Adjusted Spread over Treasuries (%). Above 5% = stressed. Above 7.5% = crisis. Peaked at ~20% in March 2020 and ~22% in 2008."
  ig_oas:
    tip: "ICE BofA BBB Option-Adjusted Spread (%). Investment-grade companies are considered safe, so a spread above 2.4% signals broad credit stress even among blue chips."
  yield_curve:
    tip: "10-Year minus 2-Year Treasury yield (%). Negative = inverted = recession warning. Has inverted before every U.S. recession since the 1970s. Currently most-watched signal."
  ten_year:
    tip: "10-Year U.S. Treasury yield (%). High rates compress equity valuations and increase debt-service burdens. Above 5%+ has historically preceded stress events."
  move_index:
    tip: "ICE BofA MOVE Index — implied volatility of U.S. Treasuries from options (basis points). Above 100 = elevated rate uncertainty. Above 175 = crisis level. Peaked at ~264 in COVID, ~182 during SVB (2023)."
  treasury_auction_stress:
    tip: "Composite z-score of Treasury auction quality (10Y Note + 30Y Bond). Combines bid-to-cover ratio, indirect bidder %, and dealer takedown % vs trailing 12-month auctions. Above 1.5σ = weak demand; above 2.0σ = rare stress historically seen ahead of funding dislocations."
  nfci:
    tip: "Chicago Fed National Financial Conditions Index. Zero = historical average. Positive = tighter-than-average conditions. Above 0.40 = materially tight. Hit 1.26 during COVID."
  stlfsi:
    tip: "St. Louis Fed Financial Stress Index. Zero = average. Positive = stress. Above 1.0 = significant stress. Peaked at 9.0 during the 2008 financial crisis."
  breakeven_5y:
    tip: "5-Year inflation breakeven rate — market's expectation for avg CPI over 5 years (%). Above 3% signals the Fed has lost control of inflation expectations."
  cpi_yoy:
    tip: "Consumer Price Index, year-over-year change (%). Above 3.5% triggers yellow; above 5% is orange. 2022 peak was 9.1% — the highest since 1981."
  sofr_spread:
    tip: "Spread between SOFR (actual overnight bank rate) and the Fed's EFFR target (basis points). Near zero = normal. Above 10–15 bps = funding stress. Above 40 bps = crisis. Last exceeded 40 bps in Sept 2019."
  repo_stress:
    tip: "Manual assessment of repo market conditions (0=calm, 1=elevated, 2=crisis, 3=extreme). Repo stress can freeze short-term funding overnight, as happened in Sept 2019."
  wti_crude:
    tip: "WTI crude oil price ($/barrel). Above $100 historically triggers recession risk. Extreme moves (±20% in weeks) indicate supply shocks or geopolitical crisis."
  oil_vol:
    tip: "1-month realized volatility of WTI crude (annualized %). Sustained above 40% suggests a supply shock or geopolitical event severe enough to destabilize energy markets."
  jobless_claims:
    tip: "4-week moving average of U.S. initial jobless claims (thousands). Above 300K signals labor market deterioration. Above 375K indicates recession conditions."
  unemployment:
    tip: "U.S. unemployment rate (%). The 'Sahm Rule': if the 3-month average rises 0.5 percentage points above the prior 12-month low, a recession has almost certainly started."
  usd_index:
    tip: "Broad real dollar index (DTWEXBGS). A strong dollar tightens financial conditions globally — EM countries with dollar-denominated debt face refinancing crises when the index rises."
  euro_hy_oas:
    tip: "ICE BofA Euro High Yield Spread (%). European credit stress often leads U.S. stress by several weeks. Above 6% = significant stress. Peaked at ~10% in March 2020."
  em_corp_oas:
    tip: "ICE BofA EM Corporate Bond Spread (%). Emerging market companies borrowing in dollars are acutely exposed to dollar strength and global risk-off. Above 3.8% = stressed."
  eem_vol:
    tip: "1-month realized volatility of the EEM ETF (EM equities, annualized %). Captures cross-border contagion. EM equity vol spikes often precede U.S. credit stress by 2–4 weeks."
  cnn_fear_greed:
    tip: "CNN Fear & Greed index (0=extreme fear, 100=extreme greed). Composite of 7 market signals. Below 25 = extreme fear. Above 75 = extreme greed. Falls back to Univ. of Michigan Consumer Sentiment if CNN is unavailable."
  iran_trigger:
    tip: "Manual geopolitical risk score (0=calm, 1=elevated, 2=crisis). Captures tail risks from Iran/Gulf tensions, which can cause sudden oil supply disruptions."
