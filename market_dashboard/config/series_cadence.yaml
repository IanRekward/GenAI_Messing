# Maximum calendar days since last observation before a staleness warning fires.
# iran_trigger and repo_stress remain fully manual — no automated source.

thresholds:
  daily: 5       # FRED/yfinance daily series: covers 3-day holiday weekends + T+1 publish lag (ICE OAS posts Mon AM with Fri's value)
  weekly: 15     # FRED weekly (NFCI, STLFSI, jobless claims): observation dated to week-ending + ~7d publication lag; a fresh series routinely sits 11-13d behind mid-week before the next print (was 10 → false-positived on STLFSI/IC4WSA).
  monthly: 75    # FRED monthly (CPI, UNRATE): observation dated to PERIOD START, not release. April data is dated YYYY-04-01 but isn't superseded until May data releases ~June 6-11, so a fresh series legitimately reaches a ~63-71d gap right before each release (was 60 → false-positived every month).

indicators:
  vix: daily
  sp500_1m_vol: daily
  hy_oas: daily
  ig_oas: daily
  yield_curve: daily
  ten_year: daily
  nfci: weekly
  stlfsi: weekly
  breakeven_5y: daily
  cpi_yoy: monthly
  sofr_spread: daily
  wti_crude: daily
  oil_vol: daily
  jobless_claims: weekly
  unemployment: monthly
  usd_index: weekly  # DTWEXBGS (H.10) is published weekly by the Fed, not daily
  euro_hy_oas: daily
  em_corp_oas: daily
  eem_vol: daily
  cnn_fear_greed: daily   # CNN Fear & Greed; falls back to FRED UMCSENT if unavailable
  move_index: daily
  treasury_auction_stress: monthly  # 10Y/30Y auctions are monthly; weekly threshold (10d) misfired between auctions
  sector_breadth: daily
  spx_200dma_distance: daily
